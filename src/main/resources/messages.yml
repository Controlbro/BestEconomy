# =========================================================
# BestEconomy Messages
# Supports:
#  - Legacy colors (&a, &b, etc.)
#  - HEX colors (#FFAA00)
#
# COLOR CHEAT SHEET:
#
# &0 Black        &8 Dark Gray
# &1 Dark Blue    &9 Blue
# &2 Dark Green   &a Green
# &3 Dark Aqua    &b Aqua
# &4 Dark Red     &c Red
# &5 Dark Purple  &d Light Purple
# &6 Gold         &e Yellow
# &7 Gray         &f White
#
# &k Obfuscated
# &l Bold
# &m Strikethrough
# &n Underline
# &o Italic
# &r Reset
# =========================================================

prefix: "#FFAA00&lBestEconomy &8» &f"

no-permission: "&cYou do not have permission."
player-not-found: "&cPlayer not found."
cannot-pay-self: "&cYou cannot pay yourself."
invalid-amount: "&cInvalid amount."
insufficient-funds: "&cYou do not have enough &5Shards&c."
max-money-reached: "&cThat player has reached the maximum &5Shards &cbalance."
min-money-reached: "&cYou cannot go below the minimum &5Shards &cbalance."
reload-complete: "&aConfiguration reloaded."
usage-eco: "&eUsage: /{currency} <give|take|reset|pay|balance> ..."
usage-pay: "&eUsage: /pay <player> <amount>"
usage-balance: "&eUsage: /balance [player]"
usage-baltop: "&eUsage: /baltop [page]"

balance:
  self: "&7Your &5Shards &7balance: &5{symbol}&a{amount}"
  other: "&7{player}'s &5Shards &7balance: &5{symbol}&a{amount}"

eco:
  give: "&aYou gave &5{symbol}&a{amount} &5Shards &ato {player}."
  take: "&cYou took &5{symbol}&c{amount} &5Shards &cfrom {player}."
  reset: "&eYou reset {player}'s &5Shards &ebalance."
  received: "&aYou received &5{symbol}&a{amount} &5Shards&a."

pay:
  sent: "&aYou paid {player} &5{symbol}&a{amount} &5Shards&a."
  received: "&aYou received &5{symbol}&a{amount} &5Shards &afrom {player}."

baltop:
  header: "#00FFCC&lTop &5Shards &lBalances &7(Page {page}/{maxpage})"
  format: "&e#{position} &f{player} &7- &5{symbol}&a{amount}"
  no-data: "&cNo data found."

currency:
  not-found: "&cCurrency not found."
  switched: "&aSwitched to currency &5{currency}&a."

shop:
  disabled: "&cThe webshop integration is not configured yet."
  players-only: "&cOnly players can use this command."
  usage: "&eUsage: /shop [resetpassword <newPassword>]"
  admin-usage: "&eUsage: /shopadmin processpending"
  account-exists: "&eYour webshop account already exists."
  password-prompt: "&eType your new webshop password in chat. &cIt will be hidden from public chat."
  password-cancelled: "&cPassword setup cancelled because you left the server."
  account-created: "&aYour webshop account has been created securely."
  account-create-failed: "&cCould not create your webshop account. Please contact staff."
  password-reset: "&aYour webshop password has been reset."
  password-reset-failed: "&cCould not reset your webshop password. Please contact staff."
  pending-started: "&aPending webshop command processing started."
