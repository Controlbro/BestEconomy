# =========================================================
# BestEconomy Messages
# Supports legacy colors (&a, &b, etc.) and HEX colors (#FFAA00)
# =========================================================

prefix: "#FFAA00&lBestEconomy &8» &f"

no-permission: "&cYou do not have permission."
player-not-found: "&cPlayer not found."
cannot-pay-self: "&cYou cannot pay yourself."
invalid-amount: "&cInvalid amount."
insufficient-funds: "&cYou do not have enough currency."
insufficient-money: "&cYou do not have enough &aMoney&c."
insufficient-shards: "&cYou do not have enough &5Shards&c."
max-money-reached: "&cThat player has reached the maximum &aMoney &cbalance."
max-shards-reached: "&cThat player has reached the maximum &5Shards &cbalance."
min-money-reached: "&cThat player cannot go below the minimum &aMoney &cbalance."
min-shards-reached: "&cThat player cannot go below the minimum &5Shards &cbalance."
reload-complete: "&aConfiguration reloaded."
usage-eco: "&eUsage: /eco <give|take|reset|set> <player> <money|shards> [amount]"
usage-pay: "&eUsage: /pay <player> <amount>"
usage-balance: "&eUsage: /balance"
usage-currency-balance: "&eUsage: /{currency}"
usage-baltop: "&eUsage: /baltop [page]"

balance:
  money:
    self: "&7Your &aMoney &7balance: {coloredsymbol}&a{amount}"
    other: "&7{player}'s &aMoney &7balance: {coloredsymbol}&a{amount}"
  shards:
    self: "&7Your &5Shards &7balance: {coloredsymbol}&a{amount}"
    other: "&7{player}'s &5Shards &7balance: {coloredsymbol}&a{amount}"

eco:
  give: "&aYou gave {coloredsymbol}&a{amount} {currency} &ato {player}."
  take: "&cYou took {coloredsymbol}&c{amount} {currency} &cfrom {player}."
  set: "&aYou set {player}'s {currency} &abalance to {coloredsymbol}&a{amount}."
  reset: "&eYou reset {player}'s {currency} &ebalance."
  received: "&aYou received {coloredsymbol}&a{amount} {currency}&a."

pay:
  sent: "&aYou paid {player} {coloredsymbol}&a{amount} {currency}&a."
  received: "&aYou received {coloredsymbol}&a{amount} {currency} &afrom {player}."

baltop:
  header: "#00FFCC&lTop {currency} &lBalances &7(Page {page}/{maxpage})"
  format: "&e#{position} &f{player} &7- {coloredsymbol}&a{amount}"
  no-data: "&cNo data found."

currency:
  not-found: "&cCurrency not found. Use money or shards."
  switched: "&aSwitched to currency {currency}&a."

shop:
  disabled: "&cThe &5Shards &cwebshop integration is not configured yet."
  players-only: "&cOnly players can use this command."
  usage: "&eUsage: /shardshop [resetpassword <newPassword>]"
  admin-usage: "&eUsage: /shopadmin processpending"
  account-exists: "&eYour &5Shards &ewebshop account already exists."
  password-prompt: "&eType your new &5Shards &ewebshop password in chat. &cIt will be hidden from public chat."
  password-cancelled: "&cPassword setup cancelled because you left the server."
  account-created: "&aYour &5Shards &ewebshop account has been created securely."
  account-create-failed: "&cCould not create your &5Shards &cwebshop account. Please contact staff."
  password-reset: "&aYour &5Shards &ewebshop password has been reset."
  password-reset-failed: "&cCould not reset your &5Shards &cwebshop password. Please contact staff."
  pending-started: "&aPending &5Shards &awebshop command processing started."
  gui-disabled: "&cThe Money shop is not configured."
  purchase-success: "&aPurchased &e{amount}x {item} &afor &aMoney &e${price}&a."
  sell-complete: "&aSold items for &aMoney &e${amount}&a."
