usage-eco: '&eUsage: /{currency} <give|take|reset|pay|balance> ...'
usage-pay: '&eUsage: /pay <player> <amount> or /shardpay <player> <amount>'
usage-balance: '&eUsage: /balance [player]'
usage-baltop: '&eUsage: /baltop [page]'

balance:
  money:
    self: '&7Your &aMoney &7balance: {coloredsymbol}&a{amount}'
    other: '&7{player}''s &aMoney &7balance: {coloredsymbol}&a{amount}'
  shards:
    self: '&7Your &5Shards &7balance: {coloredsymbol}&a{amount}'
    other: '&7{player}''s &5Shards &7balance: {coloredsymbol}&a{amount}'
  self: '&5Shards &fbalance: &5{symbol}&f{amount}'
  other: '&f{player}''s &5Shards &fbalance: &5{symbol}&f{amount}'

eco:
  set: '&aYou set {player}''s {currency} &abalance to {coloredsymbol}&a{amount}.'
  give: '&aYou gave &5{symbol}&a{amount} &5Shards &ato {player}.'
  take: '&cYou took &5{symbol}&c{amount} &5Shards &cfrom {player}.'
  reset: '&eYou reset {player}''s &5Shards &ebalance.'
  received: '&aYou received &5{symbol}&a{amount} &5Shards&a.'

pay:
  sent: '&aYou paid {player} {coloredsymbol}&a{amount} {currency}&a.'
  received: '&aYou received {coloredsymbol}&a{amount} {currency} &afrom {player}.'

baltop:
  header: '&bTop &aMoney &7(Page {page}/{maxpage})'
  format: '&e#{position} &f{player} &7- &a{symbol}{amount}'
  no-data: '&cNo Money balance data found.'

shardtop:
  header: '&bTop &5Shards &7(Page {page}/{maxpage})'
  format: '&e#{position} &f{player} &7- &5{symbol}&a{amount}'
  no-data: '&cNo Shards balance data found.'

currency:
  not-found: '&cCurrency not found.'
  switched: '&aSwitched to currency &5{currency}&a.'
