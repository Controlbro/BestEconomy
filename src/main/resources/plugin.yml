name: BestEconomy
main: com.controlbro.besteconomy.BestEconomyPlugin
version: 1.0.5
api-version: '26.1.2'
author: Controlbro
softdepend: [Vault]

commands:
  eco:
    description: Admin economy command for Money and Shards.
    aliases: [economy]
    usage: /eco <give|take|reset|set> <player> <money|shards> [amount]
  balance:
    description: Check balance.
    aliases: [bal]
    usage: /balance [player]
  baltop:
    description: View top Money balances.
    usage: /baltop [page]
  shardtop:
    description: View top Shards balances.
    usage: /shardtop [page]
  pay:
    description: Pay another player.
    usage: /pay <player> <amount>
  besteconomy:
    description: BestEconomy admin command.
    usage: /besteconomy reload
  shardshop:
    description: Create or manage your Shards webshop account.
    usage: /shardshop [resetpassword <newPassword>]
  shop:
    description: Open the Money GUI shop.
    usage: /shop
  sell:
    description: Open the item sell menu.
    usage: /sell
  shopadmin:
    description: Webshop administration command.
    usage: /shopadmin processpending

permissions:
  besteconomy.eco.give:
    description: Allows giving Money or Shards.
    default: op
  besteconomy.eco.take:
    description: Allows taking Money or Shards.
    default: op
  besteconomy.eco.reset:
    description: Allows resetting Money or Shards.
    default: op
  besteconomy.eco.set:
    description: Allows setting Money or Shards balances.
    default: op
  besteconomy.balance:
    description: Allows checking own balance.
    default: true
  besteconomy.balance.others:
    description: Allows checking others' balances.
    default: op
  besteconomy.baltop:
    description: Allows viewing baltop.
    default: true
  besteconomy.pay:
    description: Allows paying other players.
    default: true
  besteconomy.reload:
    description: Allows reloading the plugin.
    default: op
  shop.account.use:
    description: Allows creating a webshop account.
    default: true
  shop.account.reset:
    description: Allows resetting your webshop password.
    default: true
  shop.admin:
    description: Allows managing webshop pending commands.
    default: op
  shop.gui.use:
    description: Allows using the Money GUI shop.
    default: true
  shop.sell.use:
    description: Allows using the sell menu.
    default: true
